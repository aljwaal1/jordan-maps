name: Build Jordan Maps APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android project files if missing
        run: |
          flutter create . --platforms=android --org com.explapp --project-name jordan_maps_online

      - name: Patch Android manifest
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')

          needed_permissions = [
              'android.permission.INTERNET',
              'android.permission.ACCESS_FINE_LOCATION',
              'android.permission.ACCESS_COARSE_LOCATION',
          ]

          manifest_open = re.search(r'<manifest[^>]*>', text)
          if not manifest_open:
              raise SystemExit('AndroidManifest.xml manifest tag not found')

          insert = ''
          for permission in needed_permissions:
              if permission not in text:
                  insert += f'\n    <uses-permission android:name="{permission}" />'

          if insert:
              pos = manifest_open.end()
              text = text[:pos] + insert + text[pos:]

          text = re.sub(r'android:label="[^"]*"', 'android:label="خرائط الأردن"', text, count=1)
          manifest.write_text(text, encoding='utf-8')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK Debug
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jordan-maps-online-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
